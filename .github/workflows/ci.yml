name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: cpp-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Example
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Build example
        run: g++ -std=c++17 -Iinclude src/LinuxDoSpace.cpp examples/basic.cpp -o linuxdospace-cpp-example

      - name: Run example
        run: ./linuxdospace-cpp-example
